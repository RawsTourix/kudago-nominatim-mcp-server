map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

upstream app_backend {
    zone app_backend 64k;
    resolver 127.0.0.11 valid=5s ipv6=off;
    server app:8011 resolve;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    location / {
        # Starlette mounts the transport at /mcp/. Keep the public /mcp URL
        # without forcing MCP clients to repeat a POST after a redirect.
        rewrite ^/mcp$ /mcp/ break;

        proxy_pass http://app_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # MCP Streamable HTTP responses must reach the client immediately.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
