services:
  postgres:
    image: postgres:16
    container_name: kudago_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kudago}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kudago}
      POSTGRES_DB: ${POSTGRES_DB:-kudago_service}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: kudago_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: