services:
  migrate:
    volumes:
      - .:/app

  app:
    command:
      - python
      - -m
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8011"
      - --reload
      - --reload-dir
      - /app/app
    volumes:
      - .:/app
    environment:
      WATCHFILES_FORCE_POLLING: "true"

  worker:
    command:
      - arq
      - app.workers.worker_settings.WorkerSettings
      - --watch
      - /app/app
    volumes:
      - .:/app
    environment:
      WATCHFILES_FORCE_POLLING: "true"
