x-app-environment: &app-environment
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-kudago}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-kudago_service}
  REDIS_URL: redis://redis:6379/0

x-app-env-files: &app-env-files
  - path: .env.example
  - path: .env
    required: false

x-python-service: &python-service
  image: ${APP_IMAGE:-kudago-nominatim:local}
  build:
    context: .
  env_file: *app-env-files
  environment: *app-environment
  init: true
  networks:
    - backend

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kudago}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-kudago_service}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped
    networks:
      - backend

  redis:
    image: redis:7
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped
    networks:
      - backend

  migrate:
    <<: *python-service
    command:
      - python
      - -m
      - alembic
      - upgrade
      - head
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    <<: *python-service
    command:
      - python
      - -m
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8011"
      - --workers
      - "${UVICORN_WORKERS:-1}"
    expose:
      - "8011"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8011/api/v1/health/ready", timeout=3)
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped
    stop_grace_period: 30s

  worker:
    <<: *python-service
    command:
      - arq
      - app.workers.worker_settings.WorkerSettings
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: ${WORKER_STOP_GRACE_PERIOD:-150s}

  gateway:
    image: nginx:1.28-alpine
    ports:
      - "${APP_BIND_ADDRESS:-127.0.0.1}:${APP_PORT:-8011}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - --spider
        - http://127.0.0.1/api/v1/health/ready
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    restart: unless-stopped
    networks:
      - backend

networks:
  backend:

volumes:
  postgres_data:
  redis_data:
